<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
    <style>
      body 
      {
        font-family: Arial, sans-serif;
        background: linear-gradient(30deg, #4facfe, #00f2fe);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
      }      
      .login-container 
      {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }      
      h2 
      {
        text-align: center;
        margin-bottom: 20px;
      }    
      input 
      {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 5px;
        border: 1px solid #ccc;
      }    
      button 
      {
        width: 95%;
        padding: 10px;
        margin-top: 15px;
        background: #4facff;
        border: none;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
      }    
      button:hover 
      {
        background: #00c6ee;
      }    
      .error 
      {
        color: red;
        font-size: 14px;
        display: none;
      }
    </style>
</head>

<body>
  <div class="login-container">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Enter your username">
    <input type="password" id="password" placeholder="Enter your password">
    <button onclick="login()">Login</button>
      <button onclick="goToRegister()" style="margin-top:10px; background:#ccc; color:black;">
    Register
    </button>
    <p class="error" id="errorMsg">Invalid login credentials</p>
  </div>
</body>

<script>
  function goToRegister() 
  {
    window.location.href = "register.html";
  }
</script>

</html>
